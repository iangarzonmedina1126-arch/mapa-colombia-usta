<!DOCTYPE html>
<html>
<head>
  <title>Mapa Étnico América - Colombia - Llanos - USTA</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    #map { height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  // Crear mapa centrado en Colombia
  var map = L.map('map').setView([4.5, -74], 5);

  // Capa base (mapa)
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // ===== CAPAS =====
  var america = L.layerGroup();
  var colombia = L.layerGroup();
  var llanos = L.layerGroup();
  var usta = L.layerGroup();

  // ===== AMÉRICA =====
  L.marker([-13, -74]).bindPopup("Quechua").addTo(america);
  L.marker([15, -90]).bindPopup("Maya").addTo(america);

  // ===== COLOMBIA =====
  L.marker([11.5, -72.9]).bindPopup("Wayuu").addTo(colombia);
  L.marker([3.4, -76.5]).bindPopup("Nasa").addTo(colombia);

  // ===== LLANOS =====
  L.marker([4.5, -72.5]).bindPopup("Sikuani").addTo(llanos);
  L.marker([5.0, -69.0]).bindPopup("Piapoco").addTo(llanos);

  // ===== USTA / INDEPENDENCIA =====
  L.marker([4.711, -74.0721])
    .bindPopup("<b>Bogotá</b><br>Centro intelectual colonial")
    .addTo(usta);

  L.marker([4.142, -73.6266])
    .bindPopup("<b>Villavicencio</b><br>Llanos estratégicos")
    .addTo(usta);

  // ===== CONTROL DE CAPAS =====
  var overlayMaps = {
    "América": america,
    "Colombia": colombia,
    "Llanos Orientales": llanos,
    "USTA e Independencia": usta
  };

  L.control.layers(null, overlayMaps).addTo(map);

  // Activar capas por defecto
  america.addTo(map);
  colombia.addTo(map);
</script>

</body>
</html>
